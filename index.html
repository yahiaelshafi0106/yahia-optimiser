<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahia Optimizer | الموقع الرسمي</title>
    <style>
        /* الحفاظ على كل المميزات مع خلفية محترمة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a12; /* لون كحلي غامق فخم */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ميزة الخلفية التقنية الهادئة (بديلة الماتريكس) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* تأثير توهج خفيف لراحة العين */
        .glow-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        /* حاوية المحتوى - حافظنا على كل التفاصيل */
        .main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 40px;
        }

        /* زرار التحميل القوي والأنيق */
        .download-button {
            display: inline-block;
            background: linear-gradient(45deg, #007bff, #00d4ff);
            color: white;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
        }

        .download-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.5);
        }

        .features-list {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #39ff14; /* لون التميز والأمان */
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="main-container">
        <h1>YAHIA OPTIMIZER</h1>
        <p class="tagline">الخيار الأول والآمن لرفع أداء جهازك وتحسين الفريمات بذكاء.</p>
        
        <a href="Yahia_Optimizer.zip" class="download-button">تحميل الإصدار الآمن (V1.0)</a>

        <div class="features-list">
            <span>✔ تحسين المراوح</span>
            <span>✔ رفع الفريمات</span>
            <span>✔ تنظيف النظام</span>
        </div>
    </div>

    <p style="position: absolute; bottom: 20px; color: #555; font-size: 0.8rem;">
        تم التطوير بواسطة يحيى - جميع الحقوق محفوظة © 2024
    </p>
</body>
</html>
