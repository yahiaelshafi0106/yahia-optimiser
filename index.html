<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahya Optimizer | التحميل الذكي</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #0f0f0f;
            --light: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0f0f;
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; color: var(--primary); }
        .main-download { margin-top: 20px; }
        
        /* تصميم الأزرار */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,210,255,0.4); }

        .other-versions {
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .small-link {
            color: #888;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .small-link:hover { color: var(--primary); }
        
        #detected-os { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Yahya Optimizer ⚡</h1>
    <p>تم اكتشاف نظامك: <span id="detected-os">جاري الفحص...</span></p>

    <div class="main-download" id="smart-button-container">
        </div>

    <div class="other-versions">
        <p style="font-size: 0.8rem; color: #555;">أو اختر نسخة أخرى يدوياً:</p>
        <a href="Yahya_Optimizer.exe" class="small-link">تحميل نسخة Windows (.exe)</a>
        <a href="Yahya_Optimizer_Linux.AppImage" class="small-link">تحميل نسخة Linux (.AppImage)</a>
        <a href="Yahya_Optimizer_Mac.dmg" class="small-link">تحميل نسخة macOS (.dmg)</a>
    </div>
</div>

<script>
    function detectOS() {
        const platform = window.navigator.platform.toLowerCase();
        const userAgent = window.navigator.userAgent.toLowerCase();
        const btnContainer = document.getElementById('smart-button-container');
        const osText = document.getElementById('detected-os');

        let osName = "نسخة غير معروفة";
        let downloadLink = "#";
        let icon = "🚀";

        if (platform.includes('win')) {
            osName = "Windows";
            downloadLink = "Yahya_Optimizer.exe";
            icon = "🪟";
        } else if (platform.includes('linux')) {
            osName = "Linux";
            downloadLink = "Yahya_Optimizer_Linux.AppImage";
            icon = "🐧";
        } else if (platform.includes('mac')) {
            osName = "macOS";
            downloadLink = "Yahya_Optimizer_Mac.dmg";
            icon = "🍎";
        }

        osText.innerText = osName;
        btnContainer.innerHTML = `
            <a href="${downloadLink}" class="btn">
                <span>تحميل لـ ${osName}</span>
                <span style="margin-right:10px">${icon}</span>
            </a>
        `;
    }

    // تشغيل الفحص عند تحميل الصفحة
    window.onload = detectOS;
</script>

</body>
</html>
