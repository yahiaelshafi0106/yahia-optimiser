<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahya Optimizer | النسخة الرسمية</title>
    <style>
        /* التعديل: خلفية "Deep Space" فخمة وهادئة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* تعديل الشبكة لتكون أرقى وأخف */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
            animation: pulse 10s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 90%;
        }

        /* لون العنوان: أزرق كريستالي */
        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            color: #58a6ff; 
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(88, 166, 255, 0.2);
        }

        .ai-tag {
            color: #3fb950; /* أخضر تقني يطمن */
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 25px;
            display: block;
            letter-spacing: 3px;
        }

        p {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 40px;
        }

        /* منطقة الأزرار: ويندوز، ماك، لينكس */
        .download-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-win { background: #1f6feb; color: white; }
        .btn-mac { background: #ffffff; color: #000; }
        .btn-linux { background: #f0883e; color: white; }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <h1>YAHYA OPTIMIZER</h1>
        <span class="ai-tag">POWERED BY ARTIFICIAL INTELLIGENCE</span>
        <p>الجيل الجديد من تحسين أداء الألعاب والكمبيوتر بذكاء وأمان مطلق.</p>
        
        <div class="download-group">
            <a href="Yahya_Optimizer_Windows.zip" download class="btn btn-win">🪟 نسخة Windows</a>
            <a href="Yahya_Optimizer_Mac.dmg" download class="btn btn-mac">🍎 نسخة macOS</a>
            <a href="Yahya_Optimizer_Linux.tar.gz" download class="btn btn-linux">🐧 نسخة Linux</a>
        </div>
        
        <div class="footer">
            النسخة الرسمية V1.0 - تطوير يحيى © 2024
        </div>
    </div>

</body>
</html>
