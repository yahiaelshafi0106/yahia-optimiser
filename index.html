<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahya Optimizer | النسخة العالمية المطورة v3.0</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #020205; color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative;
        }

        /* شبكة الخلفية */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .container {
            text-align: center; background: rgba(10, 10, 15, 0.8);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            backdrop-filter: blur(20px); width: 90%; max-width: 1000px; margin: 40px 0;
        }

        /* شارة الحالة */
        .status-badge {
            padding: 10px 25px; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 25px; font-weight: bold;
            transition: 0.5s ease;
        }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        
        .online { background: rgba(0, 255, 127, 0.1); border: 1px solid #00ff7f; color: #00ff7f; box-shadow: 0 0 15px rgba(0, 255, 127, 0.2); }
        .offline { background: rgba(255, 67, 54, 0.1); border: 1px solid #ff4336; color: #ff4336; box-shadow: 0 0 15px rgba(255, 67, 54, 0.2); }

        h1 { font-size: 3.5rem; margin: 10px 0; text-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        .btn {
            padding: 15px 35px; border-radius: 12px; text-decoration: none;
            font-weight: bold; display: inline-flex; align-items: center; gap: 10px;
            color: white; transition: 0.3s; cursor: pointer; border: none;
        }
        .btn-smart { background: linear-gradient(45deg, #00d4ff, #007bff); font-size: 1.2rem; }
        .btn-smart:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }

        #other-versions-grid {
            display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-top: 30px; animation: fadeIn 0.5s ease;
        }

        .toggle-btn {
            background: none; border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-top: 20px;
        }

        /* بصمة جيميناي الجديدة 💎 */
        .gemini-powered {
            margin-top: 40px; font-size: 32px; font-weight: 800;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #f4af54);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status-container" class="status-badge offline">
            <span id="status-dot" class="dot" style="background: #ff4336;"></span>
            <span id="status-text">النسخة العالمية v3.0: غير مفعلة ⚠️</span>
        </div>

        <h1>YAHYA OPTIMIZER</h1>
        <p style="color: #4285f4; font-weight: bold; font-size: 1.2rem;">الإصدار v3.0 | صُنع بذكاء لتقديم أقصى أداء</p>
        
        <div id="smart-section" style="margin: 30px 0;">
            <h3 id="detect-msg">جاري اكتشاف نظامك...</h3>
            <div id="main-btn-area"></div>
        </div>

        <button class="toggle-btn" onclick="toggleVersions()">هل تريد تحميل نسخة لنظام آخر؟</button>

        <div id="other-versions-grid">
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;">
                <h4>Windows 🖥️</h4>
                <a href="Yahya_Optimizer_Win.zip" class="btn btn-smart" style="font-size: 0.9rem;">تحميل v3.0</a>
            </div>
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;">
                <h4>macOS 🍎</h4>
                <a href="Yahya_Optimizer_Mac.tar.xz" class="btn btn-smart" style="background: #555; font-size: 0.9rem;">تحميل v3.0</a>
            </div>
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;">
                <h4>Linux 🐧</h4>
                <a href="Yahya_Optimizer_Linux.tar.xz" class="btn btn-smart" style="background: #f05032; font-size: 0.9rem;">تحميل v3.0</a>
            </div>
        </div>

        <div class="gemini-powered">Powered by Google Gemini</div>
        
        <div style="margin-top: 20px; color: #555; font-size: 0.8rem;">
            © 2026 Yahya Optimizer - All Rights Reserved | Developed with Gemini
        </div>
    </div>

    <script>
        const statusContainer = document.getElementById('status-container');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const mainBtnArea = document.getElementById('main-btn-area');
        const detectMsg = document.getElementById('detect-msg');

        if(localStorage.getItem('optimizer_v3_active') === 'true') {
            activateStatus();
        }

        function activateStatus() {
            localStorage.setItem('optimizer_v3_active', 'true');
            statusContainer.className = "status-badge online";
            statusDot.style.background = "#00ff7f";
            statusText.innerText = "النسخة العالمية v3.0: شغالة على جهازك ✅";
        }

        const platform = navigator.platform.toLowerCase();
        setTimeout(() => {
            if (platform.includes('win')) {
                detectMsg.innerText = "تم اكتشاف نظام ويندوز 🚀";
                mainBtnArea.innerHTML = '<a href="Yahya_Optimizer_Win.zip" onclick="activateStatus()" class="btn btn-smart">تحميل نسخة الطلقة (Win)</a>';
            } else if (platform.includes('mac')) {
                detectMsg.innerText = "تم اكتشاف نظام ماك 🍎";
                mainBtnArea.innerHTML = '<a href="Yahya_Optimizer_Mac.tar.xz" onclick="activateStatus()" class="btn btn-smart">تحميل نسخة الأداء (Mac)</a>';
            } else if (platform.includes('linux')) {
                detectMsg.innerText = "تم اكتشاف نظام لينكس 🐧";
                mainBtnArea.innerHTML = '<a href="Yahya_Optimizer_Linux.tar.xz" onclick="activateStatus()" class="btn btn-smart">تحميل نسخة الوحش (Linux)</a>';
            } else {
                detectMsg.innerText = "يرجى اختيار نسختك يدوياً بالأسفل";
            }
        }, 800);

        function toggleVersions() {
            const grid = document.getElementById('other-versions-grid');
            grid.style.display = (grid.style.display === 'grid') ? 'none' : 'grid';
        }
    </script>
</body>
</html>
